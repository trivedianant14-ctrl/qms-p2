<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPrep Samadhan · Resolution Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=69" />
  </head>
  <body>
    <main class="qms-shell">
      <aside class="side-rail" aria-label="Console navigation">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 18V8l6 6 6-6v10" stroke="#15CAE8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="brand-name">
            <strong>NPrep <em>Samadhan</em></strong>
            <span>RESOLUTION CONSOLE</span>
          </div>
        </div>
        <nav class="rail-nav" id="productNav" aria-label="Product sections">
          <button class="active" data-section="ticket">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3a2 2 0 0 1 0 4v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 0 1 0-4z"/><path d="M13 5v2m0 4v2m0 4v2"/></svg>
            Tickets
          </button>
          <button data-section="report">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6"/><rect x="12" y="8" width="3" height="10"/><rect x="17" y="5" width="3" height="13"/></svg>
            Reports
          </button>
        </nav>
        <div class="rail-foot">INTERNAL MODULE</div>
      </aside>
      <section class="workspace">
        <header class="app-header">
          <div class="ticker" aria-live="polite">
            <svg width="34" height="14" viewBox="0 0 48 20" fill="none" stroke="#15CAE8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 10h9l3-7 5 14 4-10 3 3h22"/></svg>
            <span id="tickerText">All systems live</span>
          </div>
          <div class="user-cluster">
            <select id="profileViewSelect" aria-label="Profile view"></select>
            <span id="activeUser">Meera Joshi</span>
          </div>
        </header>

        <section class="page-head">
          <div>
            <span class="eyebrow">NPrep Samadhan</span>
            <h1>Tickets Overview</h1>
          </div>
          <div class="role-toggle" id="roleToggle" aria-label="Login role">
            <button class="active" data-role="team">Team Queue</button>
            <button data-role="manager">Manager</button>
          </div>
        </section>

        <section class="stats-row" id="statsRow" aria-label="Dashboard metrics"></section>

        <section class="fire-alerts" id="fireAlerts" hidden></section>

        <section class="toolbar">
          <label>
            Ticket ID
            <div class="search-wrap">
              <input id="searchInput" type="search" placeholder="Ticket ID..." />
              <button id="searchClear" title="Clear search">x</button>
            </div>
          </label>
          <label>
            Question ID
            <input class="text-input compact-input" id="questionIdFilter" type="search" placeholder="Question ID..." />
          </label>
          <label>
            Status
            <select id="statusFilter"></select>
          </label>
          <label>
            Assignee
            <select id="assigneeFilter"></select>
          </label>
          <label>
            Raised From
            <input class="date-input" id="dateFromFilter" type="date" />
          </label>
          <label>
            Raised To
            <input class="date-input" id="dateToFilter" type="date" />
          </label>
          <button class="ghost" id="resetFiltersButton" hidden data-reset-filters>Reset Filters</button>
          <button class="ghost" id="columnsButton">Columns</button>
          <button class="primary" id="exportCsvButton">Export CSV</button>
          <button class="primary" id="pullTicketButton" hidden data-pull-ticket>+ Pull Ticket</button>
        </section>

        <section class="ticket-tabs" id="ticketTabs" aria-label="Ticket filters"></section>

        <section class="main-grid">
          <article class="table-panel">
            <div class="table-meta">
              <button class="back-btn manager-back-btn" id="managerBackBtn" hidden data-manager-filter-clear>← Overview</button>
              <strong id="tableTitle">Team Queries Queue</strong>
              <span id="tableSubtitle">All open and closed tickets assigned to the selected login.</span>
            </div>
            <div class="bulk-assign-bar" id="bulkAssignBar" hidden>
            <span class="bulk-count"></span>
            <select id="bulkAssignSelect"></select>
            <button class="primary tiny" data-bulk-assign>Assign</button>
            <button class="ghost tiny" data-clear-selection>Clear</button>
          </div>
          <div class="table-wrap">
              <table>
                <colgroup id="tableCols"></colgroup>
                <thead>
                  <tr id="tableHead"></tr>
                </thead>
                <tbody id="ticketTable"></tbody>
              </table>
            </div>
          </article>

          <aside class="side-panel" id="insightPanel"></aside>
        </section>

        <section class="report-dashboard" id="reportDashboard" hidden></section>
      </section>
    </main>

    <section class="drawer-scrim" id="drawerScrim" hidden></section>
    <aside class="ticket-drawer" id="ticketDrawer" aria-label="Ticket details" aria-hidden="true"></aside>

    <section class="modal-scrim" id="modalScrim" hidden>
      <dialog class="config-modal" id="configModal"></dialog>
    </section>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <script src="./app.js?v=69"></script>
  </body>
</html>
